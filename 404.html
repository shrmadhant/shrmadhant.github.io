<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Access Denied</title>
    <style>
        body { background: #0d1117; color: #f85149; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .code { font-size: 5rem; font-weight: bold; border-right: 4px solid #f85149; padding-right: 15px; animation: blink 1s infinite; }
        p { color: #8b949e; margin-top: 20px; }
        a { color: #58a6ff; text-decoration: none; border: 1px solid #30363d; padding: 10px 20px; border-radius: 5px; margin-top: 20px; }
        a:hover { background: #161b22; }
        @keyframes blink { 50% { border-color: transparent; } }
    </style>
</head>
<body>
    <div class="code">404</div>
    <p>A página solicitada não foi encontrada ou o acesso foi restrito.</p>
    <a href="/">Retornar ao Terminal Principal</a>
</body>
</html>
